<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fancify My Text</title>
    <!-- Link to the JavaScript file -->
    <script src="fancifymytext.js"></script>
</head>
<body>
    <h1>Fancify My Text</h1>

    <!-- First fieldset for the text area -->
    <fieldset>
        <legend>Text</legend>
        <textarea id="myTextArea" rows="4" cols="30"></textarea>
    </fieldset>

    <!-- Second fieldset for the styling controls -->
    <fieldset>
        <legend>Fancify</legend>
        
        <button id="biggerBtn" onclick="makeBigger()">Bigger!</button>
        <br><br>
        
        <input type="radio" name="fancifyOptions" id="fancyRadio" onchange="fancifyText()">
        <label for="fancyRadio">FancyShmancy</label>
        
        <input type="radio" name="fancifyOptions" id="boringRadio" onchange="fancifyText()">
        <label for="boringRadio">BoringBetty</label>
    </fieldset>

    <br>
    
    <!-- New button for the Moo feature -->
    <button id="mooBtn" onclick="mooify()">Moo</button>

</body>
</html>
